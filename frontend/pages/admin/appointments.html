<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin | Appointments</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Tailwind CSS -->
  <link rel="stylesheet" href="../../assets/css/style.css">

  <!-- Icons -->
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.3.0/fonts/remixicon.css" rel="stylesheet">
</head>

<body class="min-h-screen">
  <div class="flex min-h-screen">
    <div id="adminSidebarRoot"></div>

    <main class="flex-1 p-6">
      <div class="max-w-7xl mx-auto space-y-6">
        <div class="bg-white border border-gray-200 rounded-3xl shadow-sm p-6">
          <div class="flex flex-col gap-4 md:flex-row md:items-center md:justify-between">
            <div>
              <p class="text-sm uppercase tracking-widest text-orange-600 font-semibold">Admin Appointments</p>
              <h1 class="text-3xl font-bold text-gray-900">Appointments</h1>
              <p class="text-gray-600 mt-2">Approve new bookings and keep schedules up to date.</p>
            </div>
            <div class="flex items-center gap-3">
              <button id="sidebarToggle" class="inline-flex items-center gap-2 rounded-lg bg-slate-100 px-4 py-2 text-sm font-semibold text-slate-700 transition-all duration-200 md:hidden">
                <i class="ri-menu-line"></i>
                Menu
              </button>
              <a href="#logout" class="btn-logout inline-flex items-center gap-2 rounded-full bg-orange-50 px-4 py-2 text-sm font-semibold text-orange-700 hover:bg-orange-100 transition">Logout</a>
            </div>
          </div>
        </div>

        <div class="bg-white shadow rounded-3xl overflow-x-auto border border-gray-100">
          <table class="min-w-full text-left text-sm divide-y divide-slate-200">
            <thead class="bg-slate-50 text-slate-700 uppercase tracking-wide text-xs">
              <tr>
                <th class="p-4">Pet</th>
                <th class="p-4">Service</th>
                <th class="p-4">Duration</th>
                <th class="p-4">Date</th>
                <th class="p-4">Time range</th>
                <th class="p-4">Status</th>
                <th class="p-4">Handled by</th>
                <th class="p-4">Actions</th>
              </tr>
            </thead>
            <tbody id="appointmentsTable" class="divide-y divide-gray-100">
              <tr><td colspan="8" class="p-4 text-center text-gray-500">Loading appointments...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <!-- ================= FOOTER ================= -->
  <footer class="footer">
    <p>&copy; 2026 PetHub. Caring for Your Pet's Health. All rights reserved.</p>
  </footer>

  <!-- ================= DARK MODE TOGGLE ================= -->
  <button id="darkModeToggle" type="button" class="dark-mode-toggle" title="Toggle Dark Mode">
    <i class="ri-moon-line"></i>
  </button>

  <script src="../../js/core/api.js"></script>
  <script src="../../js/core/utils.js"></script>
  <script src="../../js/core/storage.js"></script>
  <script src="../../js/main.js"></script>
  <script src="../../js/admin/sidebar.js"></script>
  <script src="../../js/shared/appointment-durations.js"></script>
  <script src="../../js/admin/appointments.js"></script>

</body>
</html>
