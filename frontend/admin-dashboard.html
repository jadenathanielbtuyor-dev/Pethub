<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PetHub - Admin - Redirecting...</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="flex items-center justify-center min-h-screen bg-gradient-to-br from-orange-50 to-blue-50">
  <div class="text-center">
    <h1 class="text-2xl font-bold text-gray-900 mb-2">Redirecting to Admin Dashboard...</h1>
    <p class="text-gray-600">Loading your admin panel</p>
  </div>

  <script src="js/core/api.js"></script>
  <script src="js/core/storage.js"></script>
  <script>
    // Redirect to admin dashboard with proper auth checks
    (function() {
      const user = getUser();
      if (user) {
        try {
          redirectToDashboardForRole(user.role);
        } catch (error) {
          redirectToLogin();
        }
      } else {
        redirectToLogin();
      }
    })();
  </script>
</body>
</html>
